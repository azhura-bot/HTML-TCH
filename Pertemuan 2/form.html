<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Registrasi</title>
</head>
<body>

  <h1 align="center">Form Registrasi</h1>

  <form>
    <table>
      <tr>
        <td>Nama anda</td>
        <td>:</td>
        <td><input type="text" name="nama" size="50"></td>
      </tr>
      <tr>
        <td>Password anda</td>
        <td>:</td>
        <td><input type="password" name="password" size="50"></td>
      </tr>
      <tr>
        <td>Jenis Kelamin</td>
        <td>:</td>
        <td>
          <input type="radio" name="jk" value="pria"> pria
          <input type="radio" name="jk" value="wanita"> wanita
        </td>
      </tr>
      <tr>
        <td>Binatang kesayangan</td>
        <td>:</td>
        <td>
          <select name="binatang">
            <option>Kucing</option>
            <option>Anjing</option>
            <option>Kelinci</option>
            <option>Burung</option>
          </select>
        </td>
      </tr>
      <tr>
        <td>
          <input type="submit" value="Kirimkan data">
        </td>
        <td></td>
        <td>
          <input type="reset" value="Hapus Formulir">
        </td>
      </tr>
    </table>
  </form>

</body>
</html>
