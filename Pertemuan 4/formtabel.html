<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
</head>
<body>
    <h2>Belajar Formulir</h2>

    <form id="formSiswa">
        <label>Nama:</label>
        <input type="text" id="nama"><br><br>

        <label>Jenis Kelamin:</label>
        <input type="radio" id="laki" name="gender" value="Laki-laki">
        <label for="laki">Laki-laki</label>

        <input type="radio" id="perempuan" name="gender" value="Perempuan">
        <label for="perempuan">Perempuan</label><br><br>

        <label>Email:</label>
        <input type="email" id="email"><br><br>

        <label>Password:</label>
        <input type="password" id="password"><br><br>

        <label>Pesan:</label>
        <textarea id="pesan"></textarea><br><br>

        <label for="country">Negara:</label>
        <select id="country" name="country">
            <option value="Indonesia">Indonesia</option>
            <option value="Singapura">Singapura</option>
            <option value="Malaysia">Malaysia</option>
        </select><br><br>

        <input type="submit" value="Kirim">
    </form>

    <hr>

    <h3>Hasil Input:</h3>
    <div id="hasil"></div>

    <script>
        const form = document.getElementById("formSiswa");

        form.addEventListener("submit", function(event) {
            event.preventDefault();

            const nama = document.getElementById("nama").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const pesan = document.getElementById("pesan").value;
            const negara = document.getElementById("country").value;

            const genderDipilih = document.querySelector('input[name="gender"]:checked');

            let gender = "";
            if (genderDipilih) {
                gender = genderDipilih.value;
            } else {
                gender = "Belum dipilih";
            }

            document.getElementById("hasil").innerHTML = `
                <p><strong>Nama:</strong> ${nama}</p>
                <p><strong>Jenis Kelamin:</strong> ${gender}</p>
                <p><strong>Email:</strong> ${email}</p>
                <p><strong>Password:</strong> ${password}</p>
                <p><strong>Pesan:</strong> ${pesan}</p>
                <p><strong>Negara:</strong> ${negara}</p>
            `;
        });
    </script>
</body>
</html>
