<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belajar Iframe</title>
</head>
<body>

  <h1>Belajar Menggunakan Iframe</h1>

  <p>
    Di halaman ini, kita akan menampilkan halaman lain menggunakan iframe.
  </p>

  <h2>Contoh 1: Menampilkan Halaman Profil</h2>

  <iframe 
    src="profil.html" 
    width="500" 
    height="300"
    title="Halaman Profil">
  </iframe>

  <h2>Contoh 2: Menampilkan Halaman Kalkulator</h2>

  <iframe 
    src="kalkulator.html" 
    width="400" 
    height="500"
    title="Halaman Kalkulator">
  </iframe>

</body>
</html>
